<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Market Strategy LCE Browser Example</title>
  <style>
    body { margin:0; background:#070a0f; color:#e6edf7; font-family:Segoe UI,Arial,sans-serif; }
    header { padding:16px 20px; border-bottom:1px solid #1c2635; }
    canvas { display:block; width:100vw; height:calc(100vh - 70px); }
  </style>
</head>
<body>
  <header><b>Market Strategy LCE Browser Example</b> <span id="status"></span></header>
  <canvas id="chart"></canvas>
  <script type="module">
    import { createLceEngine } from '../../packages/lce-core/src/index.mjs';
    const engine = createLceEngine({ symbols:['BTC'], timeframes:['1m','15m','1h','4h'] });
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    function resize(){ canvas.width=innerWidth*devicePixelRatio; canvas.height=(innerHeight-70)*devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
    addEventListener('resize',resize); resize();
    function candles(n){ return Array.from({length:n},(_,i)=>{ const p=75300+Math.sin(i/9)*4+i*.05; return {time:Date.now()-(n-i)*60000,open:p,high:p+2,low:p-2,close:p+Math.sin(i/4),volume:100}; }); }
    function render(){ const c=candles(300); engine.ingestCandles('BTC','1m',c); engine.ingestOrderBook('BTC',{bids:[[75360,20],[75340,8]],asks:[[75390,18],[75420,9]]}); const zones=engine.getZones('BTC').slice(0,8); const w=innerWidth,h=innerHeight-70; ctx.clearRect(0,0,w,h); ctx.fillStyle='#070a0f'; ctx.fillRect(0,0,w,h); const min=Math.min(...c.map(x=>x.low),...zones.map(z=>z.zoneLow)); const max=Math.max(...c.map(x=>x.high),...zones.map(z=>z.zoneHigh)); const y=p=>h-((p-min)/(max-min||1))*h; const step=w/c.length; for(let i=0;i<c.length;i++){ const x=i*step; ctx.strokeStyle=c[i].close>=c[i].open?'#57d68d':'#ff6b6b'; ctx.beginPath(); ctx.moveTo(x,y(c[i].low)); ctx.lineTo(x,y(c[i].high)); ctx.stroke(); } for(const z of zones){ const yy=y(z.price); ctx.strokeStyle=z.side==='demand'?'#57d68d':z.side==='supply'?'#ff6b6b':'#c7d6e8'; ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(w,yy); ctx.stroke(); ctx.fillStyle=ctx.strokeStyle; ctx.fillText(`${z.side} ${Math.round(z.strength)}`,12,yy-4); } status.textContent=` · zones: ${zones.length}`; requestAnimationFrame(render); }
    render();
  </script>
</body>
</html>
