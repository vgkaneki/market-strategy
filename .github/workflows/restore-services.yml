name: Restore services folder

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-services:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Restore services folder from generated archive chunks
        shell: bash
        run: |
          set -euo pipefail
          cat .github/generated/services-folder.tar.xz.part-*.b64 > /tmp/services-folder.tar.xz.b64
          base64 -d /tmp/services-folder.tar.xz.b64 > /tmp/services-folder.tar.xz
          echo "Expected: e2c7ab73d7f275b17d9124efab4025838c026ad6f417fa3b8b68b9f6c5eab1b5"
          echo "Actual:   $(sha256sum /tmp/services-folder.tar.xz | awk '{print $1}')"
          test "$(sha256sum /tmp/services-folder.tar.xz | awk '{print $1}')" = "e2c7ab73d7f275b17d9124efab4025838c026ad6f417fa3b8b68b9f6c5eab1b5"
          rm -rf services
          tar -xJf /tmp/services-folder.tar.xz
          rm -f SERVICES_UPLOAD_TEST.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services SERVICES_UPLOAD_TEST.txt
          if git diff --cached --quiet; then
            echo "No services changes to commit."
            exit 0
          fi
          git commit -m "Upload services folder"
          git push
