name: Restore services folder

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-services:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Restore services folder from generated archive chunks
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_SHA="41c03f9d49f718764851b1335049978e2cd462039252a569d6bc54d5360e661f"
          cat .github/generated/services-folder.tar.xz.part-*.b64 > /tmp/services-folder.tar.xz.b64
          base64 -d /tmp/services-folder.tar.xz.b64 > /tmp/services-folder.tar.xz
          ACTUAL_SHA="$(sha256sum /tmp/services-folder.tar.xz | awk '{print $1}')"
          echo "Expected: ${EXPECTED_SHA}"
          echo "Actual:   ${ACTUAL_SHA}"
          test "${ACTUAL_SHA}" = "${EXPECTED_SHA}"
          echo "Archive listing preview:"
          tar -tJf /tmp/services-folder.tar.xz | head -50
          rm -rf services
          tar -xJf /tmp/services-folder.tar.xz
          test -f services/api/package.json
          rm -f SERVICES_UPLOAD_TEST.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services SERVICES_UPLOAD_TEST.txt
          if git diff --cached --quiet; then
            echo "No services changes to commit."
            exit 0
          fi
          git commit -m "Upload services folder"
          git push
